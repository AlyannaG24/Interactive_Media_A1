
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Music</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cal+Sans&family=Reenie+Beanie&display=swap');
      </style>
      <!-- found a handwritten style font from google that suits the theme -->

  </head>
  <body>

    <!-- Navigation Section -->
    <nav class="nav button">
      <ul>
        <li><button id="back-btn">Back</button></li>
        <li><button id="next-btn">Next</button></li>
        <!-- I changed the navigation to just include back and next song buttons because I didnt need the other features like 'home' etc -->
        <!-- Decided to make the nav items buttons to make it easier to make them interactive -->
      </ul>
    </nav>

    <!-- Main Content Section -->
    <main class="container">
      <!-- Media Player Section -->
          <div class="media-player">
            <audio id="custom-audio-player">
              <source src="track-1.mp3" type="audio/mpeg" />
            </audio>

         <div class="music-info">
            <h2 id="song-title">Lofi beats</h2>
         </div>
         <!-- Since adding multiple songs, I wanted to give each a title and display is with the laptop so users can tell which track they are listing to -->
        
         
        <div class="custom-controls">
          <button id="play-pause-btn">
            <img
              id="play-pause-img"
              src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
              alt="Play Button"
              width="24"
              height="24"
            />

          </button>
          <!-- add the missing buttons or functionality here -->
          <div class="progress-bar">
            <span id="progress-bar-fill"></span>
          </div>
        </div>
      </div>




      <div>
        <button class="lights">
          <img 
          id="light-switch-img" 
          src="lights-on.png" 
          alt="Light switch toggle" />
        </button>
      </div>
        <!-- After searching w3schools, I found how to make images into interactive buttons, so i snipping tooled the light switch in both 
         light and dark mode and made that thoes the buttons-->
    





    </main>



  </body>
</html>
